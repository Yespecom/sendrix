<svg width="100%" viewBox="0 0 680 410" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip"><rect x="240" y="100" width="200" height="200" rx="52"/></clipPath>
  </defs>

  <rect x="0" y="0" width="680" height="400" fill="#F8F7F4" style="fill:rgb(248, 247, 244);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Icon box — light grey -->
  <rect x="240" y="100" width="200" height="200" rx="52" fill="#E8E6E0" style="fill:rgb(232, 230, 224);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Plane body -->
  <polygon points="293,238  293,162  390,200" fill="#04342C" clip-path="url(#clip)" style="fill:rgb(4, 52, 44);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Top fold -->
