
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Mono:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .scene {
    min-height: 380px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px; font-family: 'Syne', sans-serif;
  }

  /* ── email card stack ── */
  .stack {
    position: relative;
    width: 260px; height: 150px;
  }

  .card {
    position: absolute;
    width: 260px; height: 130px;
    background: #F8F7F4;
    border: 0.5px solid rgba(4,52,44,0.12);
    border-radius: 12px;
    padding: 18px 20px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .card-3 {
    top: 16px; left: 8px; width: 244px;
    background: #e8e6e0; opacity: 0.5;
    transform: rotate(2.5deg);
    z-index: 1;
  }
  .card-2 {
    top: 8px; left: 4px; width: 252px;
    background: #efefec; opacity: 0.75;
    transform: rotate(1.2deg);
    z-index: 2;
  }
  .card-1 {
    top: 0; left: 0;
    z-index: 3;
    animation: sendcard 2.8s ease-in-out infinite;
  }

  .card-header {
    display: flex; align-items: center; gap: 10px;
  }

  .avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: #04342C; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .avatar-lines { display: flex; flex-direction: column; gap: 3px; flex: 1; }

  .aline {
    height: 6px; border-radius: 3px; background: rgba(4,52,44,0.12);
    animation: shimmer 1.8s ease-in-out infinite;
  }
  .aline.dark { background: rgba(4,52,44,0.2); width: 70%; }
  .aline.short { width: 45%; animation-delay: 0.2s; }

  .card-body { display: flex; flex-direction: column; gap: 6px; }

  .bline {
    height: 5px; border-radius: 3px;
    background: rgba(4,52,44,0.08);
    animation: shimmer 1.8s ease-in-out infinite;
  }
  .bline.w100 { width: 100%; }
  .bline.w80  { width: 80%; animation-delay: 0.15s; }
  .bline.w60  { width: 60%; animation-delay: 0.3s; }

  .card-footer {
    display: flex; justify-content: flex-end; margin-top: 2px;
  }

  .send-btn {
    display: flex; align-items: center; gap: 5px;
    background: #04342C; border-radius: 6px;
    padding: 5px 10px;
  }

  .send-btn-text {
    font-family: 'DM Mono', monospace;
    font-size: 9px; font-weight: 400;
    letter-spacing: 0.1em; color: #F8F7F4;
    text-transform: uppercase;
  }

  /* ── typing cursor ── */
  .typing-row {
    display: flex; align-items: center; gap: 10px;
  }

  .typed-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px; font-weight: 300;
    color: rgba(4,52,44,0.5); letter-spacing: 0.05em;
    overflow: hidden; white-space: nowrap;
    width: 0;
    animation: typeout 2.8s ease-in-out infinite;
  }

  .cursor {
    width: 2px; height: 14px;
    background: #EF9F27; border-radius: 1px;
    animation: blink 0.8s step-end infinite;
  }

  /* ── counter ── */
  .counter-row {
    display: flex; gap: 28px;
  }

  .stat {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    color: #04342C; letter-spacing: -0.04em;
    animation: countup 2.8s ease-out infinite;
  }

  .stat-num.amber { color: #EF9F27; animation-delay: 0.3s; }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px; font-weight: 300;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(4,52,44,0.35);
  }

  .divider-v {
    width: 0.5px; height: 36px;
    background: rgba(4,52,44,0.1);
    align-self: center;
  }

  @keyframes sendcard {
    0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
    55%  { transform: translate(30px, -90px) rotate(-8deg); opacity: 1; }
    70%  { transform: translate(60px, -140px) rotate(-14deg); opacity: 0; }
    71%  { transform: translate(0,0) rotate(0deg); opacity: 0; }
    85%  { opacity: 0; }
    100% { transform: translate(0,0) rotate(0deg); opacity: 1; }
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  @keyframes typeout {
    0%   { width: 0; }
    40%  { width: 180px; }
    65%  { width: 180px; }
    75%  { width: 0; }
    100% { width: 0; }
  }

  @keyframes countup {
    0%   { opacity: 0.3; }
    60%  { opacity: 1; }
    100% { opacity: 0.3; }
  }
</style>

<div class="scene">

  <!-- card stack -->
  <div class="stack">
    <div class="card card-3"></div>
    <div class="card card-2"></div>
    <div class="card card-1">
      <div class="card-header">
        <div class="avatar">
          <svg width="14" height="14" viewBox="0 0 200 200">
            <polygon points="53,138 53,62 150,100" fill="#F8F7F4"/>
            <polygon points="53,62 150,100 53,100" fill="rgba(255,255,255,0.5)"/>
            <polygon points="53,138 102,100 53,118" fill="#EF9F27"/>
            <polygon points="53,138 53,110 86,100" fill="#04342C"/>
          </svg>
        </div>
        <div class="avatar-lines">
          <div class="aline dark"></div>
          <div class="aline short"></div>
        </div>
      </div>
      <div class="card-body">
        <div class="bline w100"></div>
        <div class="bline w80"></div>
        <div class="bline w60"></div>
      </div>
      <div class="card-footer">
        <div class="send-btn">
          <span class="send-btn-text">Send</span>
          <svg width="10" height="10" viewBox="0 0 16 16" fill="none">
            <path d="M2 8h12M9 3l5 5-5 5" stroke="#EF9F27" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- typing indicator -->
  <div class="typing-row">
    <div class="typed-text">AI is writing your sequence...</div>
    <div class="cursor"></div>
  </div>

  <!-- live stats -->
  <div class="counter-row">
    <div class="stat">
      <span class="stat-num">247</span>
      <span class="stat-label">Emails sent</span>
    </div>
    <div class="divider-v"></div>
    <div class="stat">
      <span class="stat-num amber">68%</span>
      <span class="stat-label">Open rate</span>
    </div>
    <div class="divider-v"></div>
    <div class="stat">
      <span class="stat-num">12</span>
      <span class="stat-label">Replies</span>
    </div>
  </div>

</div>
